services:
  postgres:
    image: postgres:16-alpine
    container_name: blackpill-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-blackpill}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - blackpill_postgres_data:/var/lib/postgresql/data

volumes:
  blackpill_postgres_data:
